<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资源库 - CUPK 学习资源导航站</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <header class="site-header"><div class="nav-wrap"><a class="brand" href="index.html"><span class="brand-mark">C</span>CUPK 学习资源导航站</a><button class="nav-toggle" aria-label="打开导航">☰</button><nav class="site-nav"><a class="nav-link" href="index.html">首页</a><a class="nav-link" href="cupk.html">CUPK</a><a class="nav-link active" href="websites.html">学习资源</a><a class="nav-link" href="team.html">小组介绍</a></nav></div></header>
    <main class="section tight">
        <div class="container">
            <span class="eyebrow">资源 / 工具 / 网站分享</span>
            <h1 class="page-title">把学习常用的网站、软件和工具放到一个资源库。</h1>
            <p class="lead">这里不是学习计划页，而是资源分享页。网站、App、电脑软件、视频链接和博主推荐都可以放进来，但每个资源都要说明适合什么学习场景。</p>

            <div class="library-toolbar">
                <input id="resourceSearch" type="search" placeholder="搜索资源：MOOC、知网、MDN、Notion、Iconfont、Kimi">
                <span id="resourceCount" class="tag coral">加载中</span>
            </div>

            <div class="filter-tabs">
                <button class="filter-tab active" data-resource-filter="all">全部资源</button>
                <button class="filter-tab" data-resource-filter="course">在线课程</button>
                <button class="filter-tab" data-resource-filter="search">资料检索</button>
                <button class="filter-tab" data-resource-filter="code">编程学习</button>
                <button class="filter-tab" data-resource-filter="tool">学习工具</button>
                <button class="filter-tab" data-resource-filter="ai">AI 工具</button>
                <button class="filter-tab" data-resource-filter="design">素材设计</button>
                <button class="filter-tab" data-resource-filter="english">英语学习</button>
                <button class="filter-tab" data-resource-filter="exam">考试考证</button>
                <button class="filter-tab" data-resource-filter="creator">博主推荐</button>
            </div>

            <div class="filter-tabs format-tabs" aria-label="资源形式筛选">
                <button class="filter-tab active" data-format-filter="all">全部形式</button>
                <button class="filter-tab" data-format-filter="website">网站</button>
                <button class="filter-tab" data-format-filter="app">App</button>
                <button class="filter-tab" data-format-filter="software">电脑软件</button>
                <button class="filter-tab" data-format-filter="video">视频链接</button>
                <button class="filter-tab" data-format-filter="creator">博主/账号</button>
            </div>

            <div class="grid cols-3" id="resourceList"></div>
        </div>
    </main>
    <footer class="site-footer"><div class="container footer-grid"><div><h3>CUPK 学习资源导航站</h3><p>资源入口来自公开官方网站，使用时请遵守对应网站规则。</p></div><div><h4>资源</h4><a href="websites.html">学习资源库</a><a href="cupk.html">CUPK 入口</a></div><div><h4>分类</h4><a href="websites.html">课程平台</a><a href="websites.html">论文检索</a></div><div><h4>项目</h4><a href="team.html">小组介绍</a></div></div></footer>
    <button class="back-top" aria-label="返回顶部">↑</button>
    <script src="javascript/data.js"></script>
    <script src="javascript/storage.js"></script>
    <script src="javascript/common.js"></script>
    <script src="javascript/resources.js"></script>
</body>
</html>
